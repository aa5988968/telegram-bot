<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ads Bot Test</title>
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f0f0f0; }
        .btn { 
            background-color: #0088cc; color: white; padding: 20px 40px; 
            border: none; border-radius: 12px; cursor: pointer; font-size: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <h2>বিজ্ঞাপন টেস্ট পেজ</h2>
    <p>বাটনটি কাজ করছে কি না পরীক্ষা করুন।</p>

    <!-- বাটন -->
    <button class="btn" id="checkButton">বিজ্ঞাপন দেখুন</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        document.getElementById('checkButton').onclick = function() {
            // ১. প্রথমে একটি এলার্ট দিয়ে চেক করি বাটন কাজ করছে কি না
            alert("বাটন ক্লিক হয়েছে! এখন লিঙ্কটি খোলার চেষ্টা করছি...");

            const myAdLink = "https://www.google.com"; // প্রথমে গুগল দিয়ে টেস্ট করুন

            try {
                // ২. টেলিগ্রামের নিজস্ব মেথড
                tg.openLink(myAdLink);
            } catch (e) {
                // ৩. যদি উপরেরটা ফেইল করে তবে সাধারণ লিঙ্ক ওপেন
                window.open(myAdLink, '_blank');
            }
        };
    </script>
</body>
</html>
