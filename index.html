<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Money Bot</title>
    <!-- টেলিগ্রাম ওয়েব অ্যাপ স্ক্রিপ্ট -->
    <script src="https://telegram.org"></script>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 20px;
            background-color: #f4f4f4;
        }
        .btn { 
            background-color: #0088cc; 
            color: white; 
            padding: 15px 25px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h2>বিজ্ঞাপন দেখে টাকা আয় করুন</h2>
    <p>নিচের বাটনে ক্লিক করে বিজ্ঞাপনটি দেখুন।</p>

    <!-- বিজ্ঞাপন ওপেন করার বাটন -->
    <button class="btn" onclick="openAd()">বিজ্ঞাপন দেখুন</button>

    <script>
        function openAd() {
            // আপনার বিজ্ঞাপনের লিঙ্ক এখানে দিন
            const myAdLink = "https://omg10.com/4/10608560"; 
            window.Telegram.WebApp.openLink(myAdLink);
        }

        // টেলিগ্রাম ওয়েব অ্যাপ রেডি করা
        window.Telegram.WebApp.ready();
    </script>
</body>
</html>
