<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Money Bot</title>
    <!-- টেলিগ্রাম ওয়েব অ্যাপের সঠিক স্ক্রিপ্ট ফাইল -->
    <script src="https://telegram.org"></script>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 20px;
            background-color: #f4f4f4;
        }
        .btn { 
            background-color: #0088cc; 
            color: white; 
            padding: 15px 25px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer;
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h2>বিজ্ঞাপন দেখে টাকা আয় করুন</h2>
    <p>নিচের বাটনে ক্লিক করে বিজ্ঞাপনটি দেখুন।</p>

    <!-- id="adButton" যোগ করা হয়েছে -->
    <button class="btn" id="adButton">বিজ্ঞাপন দেখুন</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); // অ্যাপটি প্রস্তুত কিনা নিশ্চিত করা

        document.getElementById('adButton').addEventListener('click', function() {
            const myAdLink = "https://omg10.com/4/10608560"; 
            
            // সরাসরি লিঙ্ক ওপেন করার চেষ্টা
            tg.openLink(myAdLink);
        });
    </script>
</body>
</html>
